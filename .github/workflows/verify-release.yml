name: Verify Release
run-name: "[Verify Release] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag signature
        env:
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
        run: |
          set -euo pipefail
          echo "🔍 Verifying tag: $TAG_NAME (release author: $RELEASE_AUTHOR)"

          # Delete local ref (actions/checkout may have stored the peeled commit SHA),
          # then re-fetch so the tag object is correctly resolved.
          git tag -d "$TAG_NAME" 2>/dev/null || true
          git fetch --no-tags origin "+refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"

          # Import the release author's GPG key from GitHub
          echo "🔑 Fetching GPG key for: $RELEASE_AUTHOR"
          KEY_RESPONSE=$(curl -s -w "\n%{http_code}" "https://github.com/$RELEASE_AUTHOR.gpg")
          HTTP_CODE=$(echo "$KEY_RESPONSE" | tail -n1)
          KEY_CONTENT=$(echo "$KEY_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ] || [ -z "$KEY_CONTENT" ]; then
            echo "::error::No GPG key found for $RELEASE_AUTHOR. Upload your GPG key at https://github.com/settings/keys"
            exit 1
          fi

          echo "$KEY_CONTENT" | gpg --import

          # Verify the tag signature
          echo "🔐 Verifying tag signature..."
          if ! git tag -v "$TAG_NAME"; then
            echo "::error::Tag $TAG_NAME signature verification failed. Sign the tag with: git tag -s $TAG_NAME -m 'Release $TAG_NAME' and push with: git push origin '$TAG_NAME'. Afterwards create the GitHub Release from that tag to trigger the publishing workflow."
            exit 1
          fi
          echo "✅ Tag signature verified"

          # Verify tag points to a commit on main
          echo "🔎 Verifying tag is on main..."
          PEELED_SHA=$(git rev-parse "$TAG_NAME^{}")
          if ! git merge-base --is-ancestor "$PEELED_SHA" "$(git rev-parse origin/main)"; then
            echo "::error::Tag $TAG_NAME does not point to a commit on main branch"
            exit 1
          fi
          echo "✅ All tag checks passed"
