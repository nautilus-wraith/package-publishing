name: Publish Package to npmjs
run-name: "[Publish NPM] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20.x'
        description: 'Node.js version to use'
      registry_url:
        required: false
        type: string
        default: 'https://registry.npmjs.org'
        description: 'NPM registry URL'
      package_access:
        required: false
        type: string
        default: 'public'
        description: 'Publish as "public" or "private"'
      enable_provenance:
        required: false
        type: boolean
        default: true
        description: 'Publish with OIDC provenance'
    secrets:
      NPM_TOKEN:
        required: true
        description: 'NPM token for publishing packages'
  release:
    types: [published]

jobs:
  verify-release:
    uses: nautilus-wraith/package-publishing/.github/workflows/verify-release.yml@simplification

  validate-package:
    needs: [verify-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate package metadata
        id: meta
        run: |
          if ! jq -e . package.json > /dev/null 2>&1; then
            echo "::error::Invalid package.json"
            exit 1
          fi

          # name and version are what npm actually requires to publish
          for field in name version; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::error::Missing required field '$field' in package.json"
              exit 1
            fi
          done

          # Recommended fields — warn but do not block
          for field in description license; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::warning::Missing recommended field '$field' in package.json"
            fi
          done

          PACKAGE_NAME=$(jq -r '.name' package.json | sed 's|.*/||')
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Check typosquatting patterns
        run: |
          PACKAGE_NAME="${{ steps.meta.outputs.package_name }}"
          echo "🔍 Checking typosquatting patterns for: $PACKAGE_NAME"

          declare -A PATTERNS=()
          [[ $PACKAGE_NAME == *"-"* ]] && PATTERNS["${PACKAGE_NAME//-/_}"]="Hyphen to underscore"
          [[ $PACKAGE_NAME == *"_"* ]] && PATTERNS["${PACKAGE_NAME//_/-}"]="Underscore to hyphen"
          PATTERNS["${PACKAGE_NAME}-js"]="Added '-js' suffix"
          PATTERNS["js-${PACKAGE_NAME}"]="Added 'js-' prefix"
          PATTERNS["node-${PACKAGE_NAME}"]="Added 'node-' prefix"
          [[ $PACKAGE_NAME == *"a"* ]] && PATTERNS["${PACKAGE_NAME//a/4}"]="Replaced 'a' with '4'"
          [[ $PACKAGE_NAME == *"e"* ]] && PATTERNS["${PACKAGE_NAME//e/3}"]="Replaced 'e' with '3'"
          [[ $PACKAGE_NAME == *"i"* ]] && PATTERNS["${PACKAGE_NAME//i/1}"]="Replaced 'i' with '1'"
          [[ $PACKAGE_NAME == *"o"* ]] && PATTERNS["${PACKAGE_NAME//o/0}"]="Replaced 'o' with '0'"
          [[ $PACKAGE_NAME == *"s"* ]] && PATTERNS["${PACKAGE_NAME//s/5}"]="Replaced 's' with '5'"
          [[ $PACKAGE_NAME == *"t"* ]] && PATTERNS["${PACKAGE_NAME//t/7}"]="Replaced 't' with '7'"

          FOUND=false
          for pattern in "${!PATTERNS[@]}"; do
            if npm view "$pattern" &>/dev/null; then
              FOUND=true
              VERSION=$(npm view "$pattern" version 2>/dev/null || echo "unknown")
              AUTHOR=$(npm view "$pattern" author 2>/dev/null || echo "unknown")
              echo "⚠️  $pattern (${PATTERNS[$pattern]}) — v$VERSION by $AUTHOR"
              echo "   https://www.npmjs.com/package/$pattern"
            fi
          done
          [ "$FOUND" = true ] && echo "::warning::Potential typosquatters found (see logs). Consider registering similar names." || echo "✅ No typosquatters found."

  publish:
    needs: [verify-release, validate-package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance (OIDC)
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version || '20.x' }}
          registry-url: ${{ inputs.registry_url || 'https://registry.npmjs.org' }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_ACCESS: ${{ inputs.package_access || 'public' }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          if [[ "$PACKAGE_ACCESS" != "public" && "$PACKAGE_ACCESS" != "private" ]]; then
            echo "::error::package_access must be either 'public' or 'private'"
            exit 1
          fi
          PROVENANCE_FLAG=""
          [ "$ENABLE_PROVENANCE" = "true" ] && PROVENANCE_FLAG="--provenance"
          npm publish $PROVENANCE_FLAG --access "$PACKAGE_ACCESS"
