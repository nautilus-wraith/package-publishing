name: Publish Package to npmjs
run-name: "[Publish NPM] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20.x'
        description: 'Node.js version to use'
      registry_url:
        required: false
        type: string
        default: 'https://registry.npmjs.org'
        description: 'NPM registry URL'
      package_access:
        required: false
        type: string
        default: 'public'
        description: 'Publish as "public" or "private"'
      enable_provenance:
        required: false
        type: boolean
        default: true
        description: 'Publish with OIDC provenance'
      publish_unscoped:
        required: false
        type: boolean
        default: false
        description: 'For scoped packages: also publish under the unscoped name'
    secrets:
      NPM_TOKEN:
        required: true
        description: 'NPM token for publishing packages'
  release:
    types: [published]

jobs:
  verify-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - name: Reject fork runs
        if: github.event.repository.fork == true
        run: |
          echo "::error::Publishing is not allowed from a forked repository. Only the upstream repository can publish packages."
          exit 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify tag signature
        env:
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
        run: |
          set -euo pipefail
          echo "🔍 Verifying tag: $TAG_NAME (release author: $RELEASE_AUTHOR)"

          # Delete local ref (actions/checkout may have stored the peeled commit SHA),
          # then re-fetch so the tag object is correctly resolved.
          git tag -d "$TAG_NAME" 2>/dev/null || true
          git fetch --no-tags origin "+refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"

          # Import the release author's GPG key from GitHub
          echo "🔑 Fetching GPG key for: $RELEASE_AUTHOR"
          KEY_RESPONSE=$(curl -s -w "\n%{http_code}" "https://github.com/$RELEASE_AUTHOR.gpg")
          HTTP_CODE=$(echo "$KEY_RESPONSE" | tail -n1)
          KEY_CONTENT=$(echo "$KEY_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ] || [ -z "$KEY_CONTENT" ]; then
            echo "::error::No GPG key found for $RELEASE_AUTHOR. Upload your GPG key at https://github.com/settings/keys"
            exit 1
          fi

          echo "$KEY_CONTENT" | gpg --import

          # Verify the tag signature
          echo "🔐 Verifying tag signature..."
          if ! git tag -v "$TAG_NAME"; then
            echo "::error::Tag $TAG_NAME signature verification failed. Sign the tag with: git tag -s $TAG_NAME -m 'Release $TAG_NAME' and push with: git push origin '$TAG_NAME'. Afterwards create the GitHub Release from that tag to trigger the publishing workflow."
            exit 1
          fi
          echo "✅ Tag signature verified"

          # Verify tag points to a commit on main
          echo "🔎 Verifying tag is on main..."
          PEELED_SHA=$(git rev-parse "$TAG_NAME^{}")
          if ! git merge-base --is-ancestor "$PEELED_SHA" "$(git rev-parse origin/main)"; then
            echo "::error::Tag $TAG_NAME does not point to a commit on main branch"
            exit 1
          fi
          echo "✅ All tag checks passed"

  validate-package:
    needs: [verify-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      is_scoped: ${{ steps.meta.outputs.is_scoped }}
      unscoped_available: ${{ steps.meta.outputs.unscoped_available }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract and validate package metadata
        id: meta
        env:
          PUBLISH_UNSCOPED: ${{ inputs.publish_unscoped }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          if ! jq -e . package.json > /dev/null 2>&1; then
            echo "::error::Invalid package.json"
            exit 1
          fi

          for field in name version; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::error::Missing required field '$field' in package.json"
              exit 1
            fi
          done

          for field in description license; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::warning::Missing recommended field '$field' in package.json"
            fi
          done

          if [ "$ENABLE_PROVENANCE" = "true" ]; then
            REPO_URL=$(jq -r '.repository.url // .repository // ""' package.json)
            if [ -z "$REPO_URL" ] || [ "$REPO_URL" = "null" ]; then
              echo "::warning::Missing 'repository.url' in package.json — required when publishing with provenance (enable_provenance: true)"
            fi
          fi

          FULL_NAME=$(jq -r '.name' package.json)
          PACKAGE_NAME=$(echo "$FULL_NAME" | sed 's|.*/||')
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

          if [[ "$FULL_NAME" == @*/* ]]; then
            echo "is_scoped=true" >> $GITHUB_OUTPUT
            if npm view "$PACKAGE_NAME" &>/dev/null; then
              echo "unscoped_available=false" >> $GITHUB_OUTPUT
              # Unscoped name is taken. Require explicit opt-in so the developer
              # acknowledges the situation before the pipeline proceeds.
              if [ "$PUBLISH_UNSCOPED" != "true" ]; then
                echo "::error::Unscoped name '$PACKAGE_NAME' is already registered on npm."
                echo "::error::If you own it and want to also publish under that name, update your workflow and re-run:"
                echo "::error::  jobs:"
                echo "::error::    publish-npm:"
                echo "::error::      uses: nautilus-wraith/package-publishing/.github/workflows/publish-npm.yml@..."
                echo "::error::      with:"
                echo "::error::        publish_unscoped: true"
                echo "::error::      secrets:"
                echo "::error::        NPM_TOKEN: \${{ secrets.NPM_TOKEN }}"
                echo "::error::If you do not own it, no action is needed — the scoped package will publish fine once you remove this blocker."
                exit 1
              fi
              echo "⚠️  Unscoped name '$PACKAGE_NAME' is taken — proceeding because publish_unscoped: true is set."
            else
              echo "unscoped_available=true" >> $GITHUB_OUTPUT
              echo "ℹ️  Unscoped name '$PACKAGE_NAME' is available on npm."
              if [ "$PUBLISH_UNSCOPED" != "true" ]; then
                echo "   To also claim it, add 'publish_unscoped: true' under 'with:' in your consumer workflow."
              fi
            fi
          else
            echo "is_scoped=false" >> $GITHUB_OUTPUT
            echo "unscoped_available=false" >> $GITHUB_OUTPUT
            # For unscoped packages npm enforces ownership: publishing to a name
            # you do not own will fail with a 403 from the registry.
          fi

  publish:
    needs: [verify-release, validate-package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance (OIDC)
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node_version || '20.x' }}
          registry-url: ${{ inputs.registry_url || 'https://registry.npmjs.org' }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish scoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_ACCESS: ${{ inputs.package_access || 'public' }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          if [[ "$PACKAGE_ACCESS" != "public" && "$PACKAGE_ACCESS" != "private" ]]; then
            echo "::error::package_access must be either 'public' or 'private'"
            exit 1
          fi
          PROVENANCE_FLAG=""
          [ "$ENABLE_PROVENANCE" = "true" ] && PROVENANCE_FLAG="--provenance"
          npm publish $PROVENANCE_FLAG --access "$PACKAGE_ACCESS"

  # Only present when publish_unscoped: true is set in the consumer workflow and the package is scoped.
  # Pauses for manual approval before running — configure the npm-publish-unscoped
  # GitHub Environment with required reviewers in your repository settings.
  # Reviewers should check the validate-package job logs for unscoped name availability
  # before approving.
  publish-unscoped:
    needs: [validate-package, publish]
    if: inputs.publish_unscoped == true && needs.validate-package.outputs.is_scoped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-publish-unscoped
      url: https://www.npmjs.com/package/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node_version || '20.x' }}
          registry-url: ${{ inputs.registry_url || 'https://registry.npmjs.org' }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish unscoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          UNSCOPED_NAME: ${{ needs.validate-package.outputs.package_name }}
          UNSCOPED_AVAILABLE: ${{ needs.validate-package.outputs.unscoped_available }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          echo "📋 Unscoped name : $UNSCOPED_NAME"
          echo "📋 Available     : $UNSCOPED_AVAILABLE"

          if [ "$UNSCOPED_AVAILABLE" = "false" ]; then
            echo "::warning::Name '$UNSCOPED_NAME' is already taken on npm. Attempting publish anyway — this will succeed only if you own that package."
          fi

          ORIGINAL_NAME=$(jq -r '.name' package.json)
          PROVENANCE_FLAG=""
          [ "$ENABLE_PROVENANCE" = "true" ] && PROVENANCE_FLAG="--provenance"

          npm pkg set name="$UNSCOPED_NAME"
          npm publish $PROVENANCE_FLAG --access public
          npm pkg set name="$ORIGINAL_NAME"
