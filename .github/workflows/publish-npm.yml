name: Publish Package to npmjs
run-name: "[Publish NPM] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20.x'
        description: 'Node.js version to use'
      registry_url:
        required: false
        type: string
        default: 'https://registry.npmjs.org'
        description: 'NPM registry URL'
      package_access:
        required: false
        type: string
        default: 'public'
        description: 'Publish as "public" or "private"'
      enable_provenance:
        required: false
        type: boolean
        default: true
        description: 'Publish with OIDC provenance'
      publish_unscoped:
        required: false
        type: boolean
        default: false
        description: 'For scoped packages: also publish under the unscoped name if it is available'
    secrets:
      NPM_TOKEN:
        required: true
        description: 'NPM token for publishing packages'
  release:
    types: [published]

jobs:
  verify-release:
    uses: nautilus-wraith/package-publishing/.github/workflows/verify-release.yml@simplification

  validate-package:
    needs: [verify-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      is_scoped: ${{ steps.meta.outputs.is_scoped }}
      unscoped_available: ${{ steps.meta.outputs.unscoped_available }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate package metadata
        id: meta
        env:
          PUBLISH_UNSCOPED: ${{ inputs.publish_unscoped }}
        run: |
          if ! jq -e . package.json > /dev/null 2>&1; then
            echo "::error::Invalid package.json"
            exit 1
          fi

          for field in name version; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::error::Missing required field '$field' in package.json"
              exit 1
            fi
          done

          for field in description license; do
            if ! jq -e ".$field" package.json > /dev/null 2>&1; then
              echo "::warning::Missing recommended field '$field' in package.json"
            fi
          done

          FULL_NAME=$(jq -r '.name' package.json)
          PACKAGE_NAME=$(echo "$FULL_NAME" | sed 's|.*/||')
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

          if [[ "$FULL_NAME" == @*/* ]]; then
            echo "is_scoped=true" >> $GITHUB_OUTPUT
            if npm view "$PACKAGE_NAME" &>/dev/null; then
              echo "unscoped_available=false" >> $GITHUB_OUTPUT
              # Unscoped name is taken. Require explicit opt-in so the developer
              # acknowledges the situation before the pipeline proceeds.
              if [ "$PUBLISH_UNSCOPED" != "true" ]; then
                echo "::error::Unscoped name '$PACKAGE_NAME' is already registered on npm."
                echo "::error::If you own it and intend to publish or update the unscoped package alongside the scoped one, set 'publish_unscoped: true' in your consumer workflow to acknowledge this and enable the manual approval gate."
                echo "::error::If you do not own it, no action is needed — but be aware a name collision exists."
                exit 1
              fi
              echo "⚠️  Unscoped name '$PACKAGE_NAME' is taken — proceeding because publish_unscoped: true is set."
            else
              echo "unscoped_available=true" >> $GITHUB_OUTPUT
              echo "ℹ️  Unscoped name '$PACKAGE_NAME' is available on npm."
              if [ "$PUBLISH_UNSCOPED" != "true" ]; then
                echo "   To also claim it, set 'publish_unscoped: true' in your consumer workflow."
              fi
            fi
          else
            echo "is_scoped=false" >> $GITHUB_OUTPUT
            echo "unscoped_available=false" >> $GITHUB_OUTPUT
            # For unscoped packages npm enforces ownership: publishing to a name
            # you do not own will fail with a 403 from the registry.
          fi

  publish:
    needs: [verify-release, validate-package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance (OIDC)
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version || '20.x' }}
          registry-url: ${{ inputs.registry_url || 'https://registry.npmjs.org' }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish scoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_ACCESS: ${{ inputs.package_access || 'public' }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          if [[ "$PACKAGE_ACCESS" != "public" && "$PACKAGE_ACCESS" != "private" ]]; then
            echo "::error::package_access must be either 'public' or 'private'"
            exit 1
          fi
          PROVENANCE_FLAG=""
          [ "$ENABLE_PROVENANCE" = "true" ] && PROVENANCE_FLAG="--provenance"
          npm publish $PROVENANCE_FLAG --access "$PACKAGE_ACCESS"

  # Only present when publish_unscoped: true and the package is scoped.
  # Pauses for manual approval before running — configure the npm-publish-unscoped
  # GitHub Environment with required reviewers in your repository settings.
  # Reviewers should check the validate-package job logs for unscoped name availability
  # before approving.
  publish-unscoped:
    needs: [validate-package, publish]
    if: inputs.publish_unscoped == true && needs.validate-package.outputs.is_scoped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-publish-unscoped
      url: https://www.npmjs.com/package/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version || '20.x' }}
          registry-url: ${{ inputs.registry_url || 'https://registry.npmjs.org' }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish unscoped package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          UNSCOPED_NAME: ${{ needs.validate-package.outputs.package_name }}
          UNSCOPED_AVAILABLE: ${{ needs.validate-package.outputs.unscoped_available }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          echo "📋 Unscoped name : $UNSCOPED_NAME"
          echo "📋 Available     : $UNSCOPED_AVAILABLE"

          if [ "$UNSCOPED_AVAILABLE" = "false" ]; then
            echo "::warning::Name '$UNSCOPED_NAME' is already taken on npm. Attempting publish anyway — this will succeed only if you own that package."
          fi

          ORIGINAL_NAME=$(jq -r '.name' package.json)
          PROVENANCE_FLAG=""
          [ "$ENABLE_PROVENANCE" = "true" ] && PROVENANCE_FLAG="--provenance"

          npm pkg set name="$UNSCOPED_NAME"
          npm publish $PROVENANCE_FLAG --access public
          npm pkg set name="$ORIGINAL_NAME"
