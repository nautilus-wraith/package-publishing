name: Publish Package to PyPI
run-name: "[Publish PyPI] Ref:${{ github.ref_name }} Event:${{ github.event_name }}"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: '3.11'
        description: 'Python version to use'
      enable_provenance:
        required: false
        type: boolean
        default: true
        description: 'Publish with OIDC provenance'
    secrets:
      PYPI_TOKEN:
        required: true
        description: 'PyPI token for publishing packages'
  release:
    types: [published]

jobs:
  verify-release:
    uses: nautilus-wraith/package-publishing/.github/workflows/verify-release.yml@simplification

  validate-package:
    needs: [verify-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.11' }}

      - name: Install metadata tools
        run: |
          python -m pip install --upgrade pip
          pip install "tomli; python_version < '3.11'"

      - name: Extract and validate package metadata
        id: meta
        run: |
          python - <<'PYEOF'
          import sys, os, subprocess

          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          def out(line):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(line + "\n")

          if os.path.exists("pyproject.toml"):
              with open("pyproject.toml", "rb") as f:
                  data = tomllib.load(f)
              project = data.get("project", {})
              for field in ("name", "version"):
                  if field not in project:
                      print(f"::error::Missing required field '{field}' in pyproject.toml [project]")
                      sys.exit(1)
              for field in ("description", "authors", "license"):
                  if field not in project:
                      print(f"::warning::Missing recommended field '{field}' in pyproject.toml [project]")
              out(f"package_name={project['name']}")

          elif os.path.exists("setup.py"):
              import ast
              try:
                  ast.parse(open("setup.py").read())
              except SyntaxError as e:
                  print(f"::error::Invalid setup.py: {e}")
                  sys.exit(1)
              name = subprocess.check_output(
                  [sys.executable, "setup.py", "--name"], stderr=subprocess.DEVNULL
              ).decode().strip()
              out(f"package_name={name}")

          else:
              print("::error::No pyproject.toml or setup.py found")
              sys.exit(1)
          PYEOF

      - name: Check typosquatting patterns
        env:
          PACKAGE_NAME: ${{ steps.meta.outputs.package_name }}
        run: |
          echo "🔍 Checking typosquatting patterns for: $PACKAGE_NAME"

          declare -A PATTERNS=()
          [[ $PACKAGE_NAME == *"-"* ]] && PATTERNS["${PACKAGE_NAME//-/_}"]="Hyphen to underscore"
          [[ $PACKAGE_NAME == *"_"* ]] && PATTERNS["${PACKAGE_NAME//_/-}"]="Underscore to hyphen"
          PATTERNS["${PACKAGE_NAME}-py"]="Added '-py' suffix"
          PATTERNS["py-${PACKAGE_NAME}"]="Added 'py-' prefix"
          PATTERNS["python-${PACKAGE_NAME}"]="Added 'python-' prefix"
          [[ $PACKAGE_NAME == *"a"* ]] && PATTERNS["${PACKAGE_NAME//a/4}"]="Replaced 'a' with '4'"
          [[ $PACKAGE_NAME == *"e"* ]] && PATTERNS["${PACKAGE_NAME//e/3}"]="Replaced 'e' with '3'"
          [[ $PACKAGE_NAME == *"i"* ]] && PATTERNS["${PACKAGE_NAME//i/1}"]="Replaced 'i' with '1'"
          [[ $PACKAGE_NAME == *"o"* ]] && PATTERNS["${PACKAGE_NAME//o/0}"]="Replaced 'o' with '0'"
          [[ $PACKAGE_NAME == *"s"* ]] && PATTERNS["${PACKAGE_NAME//s/5}"]="Replaced 's' with '5'"
          [[ $PACKAGE_NAME == *"t"* ]] && PATTERNS["${PACKAGE_NAME//t/7}"]="Replaced 't' with '7'"

          FOUND=false
          for pattern in "${!PATTERNS[@]}"; do
            if curl -sf "https://pypi.org/pypi/$pattern/json" | grep -q '"info"'; then
              FOUND=true
              VERSION=$(curl -s "https://pypi.org/pypi/$pattern/json" | python -c "import sys,json; print(json.load(sys.stdin)['info']['version'])" 2>/dev/null || echo "unknown")
              AUTHOR=$(curl -s "https://pypi.org/pypi/$pattern/json" | python -c "import sys,json; print(json.load(sys.stdin)['info']['author'])" 2>/dev/null || echo "unknown")
              echo "⚠️  $pattern (${PATTERNS[$pattern]}) — v$VERSION by $AUTHOR"
              echo "   https://pypi.org/project/$pattern"
            fi
          done
          [ "$FOUND" = true ] && echo "::warning::Potential typosquatters found (see logs). Consider registering similar names." || echo "✅ No typosquatters found."

  publish:
    needs: [verify-release, validate-package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance (OIDC)
    environment:
      name: pypi-publish
      url: https://pypi.org/project/${{ needs.validate-package.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.11' }}

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          ENABLE_PROVENANCE: ${{ inputs.enable_provenance }}
        run: |
          if [ "$ENABLE_PROVENANCE" = "true" ]; then
            twine upload --non-interactive dist/* --provenance
          else
            twine upload --non-interactive dist/*
          fi
